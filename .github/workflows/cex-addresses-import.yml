name: CEX addresses import

on:
  schedule:
    - cron: "0 0 1,16 * *"
  workflow_dispatch:

concurrency:
  group: cex-addresses-import
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/cex_addresses_import
        run: uv sync

      - name: Run CEX addresses import
        working-directory: workers/cex_addresses_import
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DUNE_KEY: ${{ secrets.DUNE_KEY }}
          DUNE_QUERY_ID: "7520736"
          DUNE_PAGE_SIZE: "10000"
        run: uv run python job.py
