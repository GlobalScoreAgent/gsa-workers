name: AI Agent Classifier

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      providers:
        description: "Optional provider filter (comma-separated names, e.g. TokenRouter)"
        required: false
        default: ""
      max_runtime_seconds:
        description: "Max runtime seconds (default 19800)"
        required: false
        default: "19800"

concurrency:
  group: ai-agent-classifier
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/ai_agent_classifier
        run: uv sync

      - name: Run AI agent classifier
        working-directory: workers/ai_agent_classifier
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          GROQ: ${{ secrets.GROQ }}
          CEREBRAS: ${{ secrets.CEREBRAS }}
          GEMINI: ${{ secrets.GEMINI }}
          OPEN_ROUTER: ${{ secrets.OPEN_ROUTER }}
          TOKEN_ROUTER: ${{ secrets.TOKEN_ROUTER }}
          MAX_RUNTIME_SECONDS: ${{ inputs.max_runtime_seconds || '19800' }}
          PROVIDERS: ${{ inputs.providers }}
          CONCURRENCY: 1
          CLAIM_BATCH_SIZE: 20
          # One asyncio worker per active llm provider (parallel drain).
          # Optional PROVIDERS filter: Groq,Cerebras,GEMINI,OpenRouter,TokenRouter
        run: uv run python job.py
