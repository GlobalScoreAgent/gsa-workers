name: Dune queries import

on:
  schedule:
    - cron: "0 0 1,16 * *"
  workflow_dispatch:

concurrency:
  group: dune-queries-import
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/dune_queries_import
        run: uv sync

      - name: Run Dune queries import
        working-directory: workers/dune_queries_import
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DUNE_KEY: ${{ secrets.DUNE_KEY }}
          DUNE_PAGE_SIZE: "10000"
          DUNE_PAGE_DELAY_SECONDS: "2"
          DUNE_TASK_DELAY_SECONDS: "3"
          UPSERT_CHUNK_SIZE: "5000"
        run: uv run python job.py
