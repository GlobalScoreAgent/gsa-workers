name: Wallet token activity scan

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/wallet_token_activity_scan
        run: uv sync

      - name: Build matrix from chains.token_activity_runner_count
        id: build
        working-directory: workers/wallet_token_activity_scan
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: uv run python scripts/build_matrix.py

  scan:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    concurrency:
      group: wallet-token-activity-scan-${{ matrix.chain }}-${{ matrix.shard }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/wallet_token_activity_scan
        run: uv sync

      - name: Run token activity scan
        working-directory: workers/wallet_token_activity_scan
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CHAIN: ${{ matrix.chain }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ matrix.shards }}
          WALLET_BATCH_SIZE: 50
          CLAIM_STALE_SECONDS: 7200
          MAX_RUNTIME_SECONDS: 19800
          ACTIVITY_CATCHUP_MAX_DAYS: 3
          LOG_CHUNK_BLOCKS: 2000
          LOG_CHUNK_MIN: 50
          LOG_CHUNK_MAX: 10000
          RPC_MIN_INTERVAL_MS: 150
          RPC_RETRY_BASE_SECONDS: 1
          WORKER_ID: ${{ matrix.chain }}-s${{ matrix.shard }}
        run: uv run python job.py
