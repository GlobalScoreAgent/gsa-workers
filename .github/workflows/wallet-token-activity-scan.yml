name: Wallet token activity scan

on:
  # Stagger vs other workers at 0/6/12/18 (Free ~20 concurrent).
  schedule:
    - cron: "0 3 * * *"
    - cron: "0 9 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/token_activity/probe
        run: uv sync

      - name: Build matrix from chains.token_activity_runner_count
        id: build
        working-directory: workers/token_activity/probe
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: uv run python scripts/build_matrix.py

  scan:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      # Exactly 7 cells: BSC×3 + Base×2 + ETH×1 + _rest. Eth/Base/_rest pivot → BSC helper.
      max-parallel: 7
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
    concurrency:
      group: wallet-token-activity-scan-${{ matrix.chain }}-${{ matrix.shard }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/token_activity/probe
        run: uv sync

      - name: Run token activity scan
        working-directory: workers/token_activity/probe
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          CHAIN: ${{ matrix.chain }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ matrix.shards }}
          # Batch / LOG_CHUNK_* unset → NETWORKS defaults per chain.
          # Long-tail covered by CHAIN=_rest (sequential), then BSC helper.
          REST_CHAINS: "celo,polygon,arbitrum,xlayer,gnosis"
          CONCURRENCY: "1"
          CLAIM_STALE_SECONDS: 7200
          CLAIM_JITTER_MS: "2000"
          MAX_RUNTIME_SECONDS: 19800
          ACTIVITY_CATCHUP_MAX_DAYS: 15
          NATIVE_GATE_EVERY_N_LOOPS: 1
          RPC_MIN_INTERVAL_MS: 400
          RPC_RETRY_BASE_SECONDS: 2
          WORKER_ID: ${{ matrix.chain }}-s${{ matrix.shard }}
        run: uv run python job.py
