name: Wallet nonce balance daily

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  run:
    strategy:
      matrix:
        worker_id: [worker-a, worker-b]
    concurrency:
      group: wallet-nonce-balance-daily-${{ matrix.worker_id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/wallet_nonce_balance_daily
        run: uv sync

      - name: Run daily wallet job
        working-directory: workers/wallet_nonce_balance_daily
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
          WORKER_ID: ${{ matrix.worker_id }}
          CONCURRENCY: 20
          CLAIM_BATCH_SIZE: 200
          CLAIM_STALE_SECONDS: 7200
          MAX_RUNTIME_SECONDS: 19800
        run: uv run python job.py
