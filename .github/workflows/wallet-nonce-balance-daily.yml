name: Wallet nonce balance daily

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
    - cron: "0 12 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

concurrency:
  group: wallet-nonce-balance-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/wallet_nonce_balance_daily
        run: uv sync

      - name: Run daily wallet job
        working-directory: workers/wallet_nonce_balance_daily
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          ALCHEMY_KEY: ${{ secrets.ALCHEMY_KEY }}
        run: uv run python job.py
