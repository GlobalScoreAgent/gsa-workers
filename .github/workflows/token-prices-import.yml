name: Token prices import

on:
  workflow_dispatch:

concurrency:
  group: token-prices-import
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: workers/token_prices_import
        run: uv sync

      - name: Run token prices enrich
        working-directory: workers/token_prices_import
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          COINGECKO_KEY: ${{ secrets.COINGECKO_KEY }}
          COINGECKO_API_PLAN: "demo"
          PRICE_CACHE_TTL_HOURS: "24"
          MIN_LIQUIDITY_USD: "1000"
          MAX_RUNTIME_SECONDS: "19800"
        run: uv run python job.py
